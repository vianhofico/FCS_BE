name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main # Chú ý: Nếu nhánh chính trên GitHub của bạn tên là 'master', hãy đổi 'main' thành 'master'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Cấp quyền cho GitHub Actions được phép ghi đè image lên GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Đẩy đúng vào tên image mà docker-compose.yml đang chờ
          tags: ghcr.io/vianhofico/rewear-backend:latest
          # Lưu cache để các lần build sau nhanh hơn
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            # Di chuyển vào thư mục chứa docker-compose.yml và .env trên máy ảo
            cd rewear-deploy
            
            # Đăng nhập vào GHCR ngay trên EC2 để có quyền pull image private (nếu có)
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            # Chỉ kéo bản cập nhật mới nhất của riêng container 'app'
            docker compose pull app
            
            # Chạy lại hệ thống ở chế độ ngầm (-d). 
            # Docker sẽ tự nhận diện 'app' có image mới và restart riêng nó, các service khác giữ nguyên.
            docker compose up -d
            
            # Xóa các Docker image cũ không còn sử dụng để tránh tràn ổ cứng 20GB của EC2
            docker image prune -f