spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fcs_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  security:
    jwt-secret: ${JWT_SECRET:dev-secret-key-change-me}
