spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5s}
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: ${GOOGLE_REDIRECT_URI}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://www.rewear.studio}
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:https://rewear.studio/auth/oauth2/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:https://rewear.studio/auth/login}
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-access-secret: ${JWT_ACCESS_SECRET:${JWT_SECRET}}
    jwt-refresh-secret: ${JWT_REFRESH_SECRET:${JWT_SECRET}}
  storage:
    minio:
      enabled: ${MINIO_ENABLED:true}
      endpoint: ${MINIO_ENDPOINT}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      bucket: ${MINIO_BUCKET}
      secure: ${MINIO_SECURE:true}
      presigned-max-expiry-seconds: ${MINIO_PRESIGNED_MAX_EXPIRY_SECONDS:604800}

server:
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        secure: true
        same-site: None
