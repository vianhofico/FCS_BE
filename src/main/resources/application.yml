spring:
  application:
    name: fcs-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
            scope: ${GOOGLE_SCOPE:openid,profile,email}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173}
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/auth/oauth2/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/auth/login}
  security:
    jwt-secret: ${JWT_SECRET:dev-secret-key-change-me}
    jwt-access-secret: ${JWT_ACCESS_SECRET:dev-access-secret-change-me}
    jwt-refresh-secret: ${JWT_REFRESH_SECRET:dev-refresh-secret-change-me}
    jwt-access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    jwt-refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:2592000}
    jwt-issuer: ${JWT_ISSUER:fcs-be}
  storage:
    minio:
      enabled: ${MINIO_ENABLED:true}
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:fcs-media}
      secure: ${MINIO_SECURE:false}
      presigned-max-expiry-seconds: ${MINIO_PRESIGNED_MAX_EXPIRY_SECONDS:604800}
  payment:
    payos:
      client-id: ${PAYOS_CLIENT_ID:}
      api-key: ${PAYOS_API_KEY:}
      checksum-key: ${PAYOS_CHECKSUM_KEY:}
      return-url: ${PAYOS_RETURN_URL:http://localhost:5173/buyer/payments/return}
      cancel-url: ${PAYOS_CANCEL_URL:http://localhost:5173/buyer/payments/cancel}
      payment-ttl-minutes: ${PAYOS_PAYMENT_TTL_MINUTES:15}
