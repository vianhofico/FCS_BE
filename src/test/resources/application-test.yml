spring:
  datasource:
    url: jdbc:h2:mem:fcs_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  mail:
    host: localhost
    port: 9999
  data:
    redis:
      host: localhost
      port: 16379
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

app:
  security:
    jwt-secret: this-is-a-very-long-test-secret-key-with-256-bits-or-more-characters-for-jwts-encryption-test-key
    jwt-access-secret: this-is-a-very-long-test-access-secret-key-with-256-bits-or-more-characters-for-jwts-encryption
    jwt-refresh-secret: this-is-a-very-long-test-refresh-secret-key-with-256-bits-or-more-characters-for-jwts-encryption
    jwt-access-ttl-seconds: 3600
    jwt-refresh-ttl-seconds: 604800
    jwt-issuer: fcs-backend-test
  cors:
    allowed-origins: http://localhost:3000
  storage:
    minio:
      enabled: false
