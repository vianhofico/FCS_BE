spring:
  datasource:
    url: jdbc:h2:mem:fcs_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

app:
  cors:
    allowed-origins: http://localhost:3000
  storage:
    minio:
      enabled: false
